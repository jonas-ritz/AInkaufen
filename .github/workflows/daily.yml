name: Daily Price Comparison

on:
  schedule:
    - cron: '0 5 * * *'  # Täglich ~06:00/07:00 Uhr deutscher Zeit (CET/CEST)
  workflow_dispatch:      # Manuell auslösbar zum Testen

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS_JSON" > credentials.json

      - name: Run price comparison
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          PLZ: ${{ secrets.PLZ }}
        run: python -m Ainkaufen.main
