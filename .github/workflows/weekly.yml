name: Weekly Price Comparison

on:
  schedule:
    - cron: '0 1 * * 5'  # Freitags ~02:00 Uhr deutscher Zeit (CET)
  workflow_dispatch:      # Manuell auslösbar zum Testen

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS_JSON" > credentials.json

      - name: Run price comparison
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          PLZ: ${{ secrets.PLZ }}
        run: python -m Ainkaufen.main
